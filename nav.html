<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skepper Header</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="nav.css" />
</head>
<body>
  <header class="sk-nav">
    <div class="sk-nav__inner">
      <a class="sk-nav__brand" href="#" aria-label="Skepper home">
        <img src="public/images/home/logo.png" alt="Skepper" />
      </a>

      <div class="sk-nav__actions">
        <nav class="sk-nav__social" aria-label="Social links">
          <a href="#" target="_blank" rel="noreferrer">Linkedin</a>
          <a href="#" target="_blank" rel="noreferrer">Instagram</a>
        </nav>

        <button class="sk-nav__menu" type="button" aria-label="Open menu">
          <span class="sk-nav__menu-text">Menu</span>
          <span class="sk-nav__menu-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
    </div>
  </header>
</body>
</html>
